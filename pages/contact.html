<body class="dark">

    <main class="container">
        <section class="page-hero">
            <h1>İletişim</h1>
            <p>Benimle iletişime geçmek isterseniz, aşağıdaki formu doldurabilirsiniz. Her türlü soru, öneri veya işbirliği tekliflerine açığım!</p>
        </section>

        <div class="contact-wrapper">
            <div class="contact-form-panel">
                <div class="form-bg-pattern"></div>
                
                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">İsim</label>
                        <input id="name" name="name" type="text" placeholder="Ömer Asaf Furta" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Mail</label>
                        <input id="email" name="email" type="email" placeholder="omerasaf@gmail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Mesaj</label>
                        <textarea id="message" name="message" rows="6" placeholder="Mesajınızı buraya yazın" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">Gönder</button>
                    <div id="form-status" class="form-status"></div>
                </form>
            </div>
        </div>
